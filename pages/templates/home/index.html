<!-- templates/index.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Home - Vale Dash{% endblock %}

{% block content %}

<style>
    #custom-tooltip {
        position: absolute;
        background: white;
        border: 1px solid black;
        padding: 10px;
        border-radius: 5px;
        pointer-events: auto;
        display: none;
        z-index: 1000;
    }
    #severity-cards-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }
    .severity-card {
        padding: 12px 14px;
        border-radius: 8px;
        background: #fff;
        border: 1px solid #e6e6e6;
        transition: box-shadow 0.2s;
        cursor: default;
    }
    .severity-card:hover {
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .severity-card-header {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
    }
    .severity-rank {
        font-size: 14px;
        font-weight: 700;
        color: #aaa;
        margin-right: 8px;
    }
    .severity-name {
        font-weight: 600;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .severity-bar-wrap {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        align-items: flex-end;
        padding: 8px;
        background-color: #f5f5f5;
        border-radius: 6px;
    }
    .severity-segment {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
    }
    .severity-segment-bar {
        width: 100%;
        height: 18px;
        border-radius: 3px;
        transition: background-color 0.5s ease;
        border: 1px solid #ddd;
    }
    .severity-segment-bar.filled {
        border-color: #999;
    }
    .severity-segment-label {
        font-size: 10px;
        font-weight: 700;
        text-align: center;
        width: 100%;
    }
    .severity-meta {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #666;
    }
    .severity-meta strong {
        color: #333;
    }
    .sensor-card {
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        background: #fff;
        margin-bottom: 0;
        overflow: hidden;
    }
    .sensor-card-header {
        background: #f7f7f7;
        padding: 10px 15px;
        font-weight: 600;
        font-size: 14px;
        border-bottom: 1px solid #e6e6e6;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .sensor-card-header .badge-severity {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
    }
    .sensor-card-body {
        display: flex;
        gap: 0;
    }
    .sensor-chart-col {
        flex: 1;
        padding: 10px;
        position: relative;
    }
    .sensor-chart-col:first-child {
        border-right: 1px solid #eee;
    }
    .sensor-chart-wrap {
        position: relative;
        height: 250px;
    }
    .sensor-chart-label {
        font-size: 11px;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }
    .page-footer {
        text-align: center;
        padding: 10px 0;
        color: #888;
        font-size: 13px;
        border-top: 1px solid #e6e6e6;
        margin-top: 15px;
    }
</style>

<div class="row" id="chart_container">
    <div class="col-md-12 col-sm-12 px-0">
        <div class="x_panel tile">
            <div class="x_title">
                <h2>Sensor Severity Ranking</h2>
                <div class="clearfix"></div>
            </div>
            <div class="x_content" id="severity-cards-container">
                <!-- Severity cards rendered dynamically -->
            </div>
        </div>
    </div>
</div>
<div class="row" id="sensor-charts-container">
    <!-- 2x2 grid of sensor cards rendered dynamically -->
</div>

<div class="page-footer">
    Last updated: <span id="last-update">—</span>
</div>

<script>
    function severity2color(severity) {
        const norm = (severity - 1) / 5;
        const colorScale = d3.scaleLinear()
            .domain([0, 0.5, 1]) // Normalized values
            .range(["green", "yellow", "red"]); // Corresponding colors

        return colorScale(norm); // Return the mapped color
    }

    function parseData_fromserver(data) {
        const timestamps = data.df_timestamp;
        const predictions = data.y_pred_send;
        const predictions_std = data.y_pred_std_send;
        const originalData = data.df_feature_send;
        const lossData = data.loss_send;

        const severityData = data.counter_feature_s2
        const severityLabels = Object.keys(severityData);
        const severityValues = severityLabels.map(label => severityData[label].severity);
        const severityCounts = severityLabels.map(label => parseInt(severityData[label].count) + "%");

        const colors = severityValues.map(value => severity2color(value));

        return [timestamps, predictions, predictions_std, originalData, lossData, severityData, severityLabels, severityValues, severityCounts, colors]
    }

    let chart_array = [];
    let losschart_array = [];

    function renderSeverityCards(severityLabels, severityValues, severityCounts, colors) {
        const container = document.getElementById('severity-cards-container');
        container.innerHTML = '';
        // Sort by severity descending for ranking
        const indices = severityLabels.map((_, i) => i);
        indices.sort((a, b) => severityValues[b] - severityValues[a]);

        indices.slice(0, 9).forEach((i, rank) => {
            const maxSev = 6;
            const currentValue = Math.min(severityValues[i], maxSev);
            const card = document.createElement('div');
            card.className = 'severity-card';
            
            // Build segmented progress bar
            let barHTML = '<div class="severity-bar-wrap">';
            for (let segment = 1; segment <= 6; segment++) {
                const isFilled = segment <= currentValue;
                const segmentColor = severity2color(segment);
                // Active bars: full opacity, Inactive bars: low opacity with severity color
                const barColor = isFilled ? segmentColor : d3.color(segmentColor).copy({opacity: 0.10}).toString();
                const filledClass = isFilled ? 'filled' : '';
                // Darken label color using darker shade of the severity color
                const labelColor = d3.color(segmentColor).darker(1).toString();
                barHTML += `
                    <div class="severity-segment">
                        <div class="severity-segment-bar ${filledClass}" style="background-color:${barColor} !important;"></div>
                        <span class="severity-segment-label" style="color:${labelColor}">${segment}</span>
                    </div>
                `;
            }
            barHTML += '</div>';
            
            card.innerHTML = `
                <div class="severity-card-header">
                    <span class="severity-rank">#${rank + 1}</span>
                    <span class="severity-name">${severityLabels[i]}</span>
                </div>
                ${barHTML}
                <div class="severity-meta">
                    <span>Severity: <strong style="color:${colors[i]}">${severityValues[i].toFixed(1)}</strong></span>
                    <span>Confidence: <strong>${severityCounts[i]}</strong></span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateTimeinfo() {
        $.ajax({
            type: "GET",
            dataType: "json",
            url: "/api/timeinfo_detail",
            success: function (data) {
                const lastUpdateUtc = new Date(
                    data.datetime_last.endsWith('Z')
                        ? data.datetime_last
                        : data.datetime_last + 'Z'
                );
                document.getElementById("last-update").textContent =
                    lastUpdateUtc.toLocaleString('en-GB', {
                        timeZone: 'Asia/Makassar',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
            }
        });
    }

    function updateChart() {
        var end_date = nowDateMoment.format("YYYY-MM-DDTHH:mm:ss"); // moment.utc();
        var start_date = nowDateMoment.subtract(2, 'hours').format("YYYY-MM-DDTHH:mm:ss");

        $.ajax({
            type: "GET",
            dataType: "json",
            data: { start_date: start_date, end_date: end_date },
            url: "/api/severity_plot",
            success: function (data) {
                let [timestamps, predictions, predictions_std, originalData, lossData, severityData, severityLabels, severityValues, severityCounts, colors] = parseData_fromserver(data)

                // Line Charts
                severityLabels.slice(0, 4).forEach((feature, idx) => {
                    const predData = predictions.map(row => row[idx]);
                    const upperBound = predictions.map((row, i) => row[idx] + predictions_std[i][idx]);
                    const lowerBound = predictions.map((row, i) => row[idx] - predictions_std[i][idx]);

                    chart_array[idx].data.labels = timestamps;
                    chart_array[idx].data.datasets[0] = { label: "Original", data: originalData.map(row => row[idx]), borderColor: "red", backgroundColor: "red", fill: false };
                    chart_array[idx].data.datasets[1] = { label: "Prediction", data: predData, borderColor: "blue", backgroundColor: "blue", fill: false };
                    chart_array[idx].data.datasets[2] = { label: "Uncertainty", data: upperBound, borderColor: "rgba(0,0,255,0.2)", backgroundColor: "rgba(0,0,255,0.1)", borderWidth: 0, pointRadius: 0, fill: false };
                    chart_array[idx].data.datasets[3] = { label: "Uncertainty", data: lowerBound, borderColor: "rgba(0,0,255,0.2)", backgroundColor: "rgba(0,0,255,0.1)", borderWidth: 0, pointRadius: 0, fill: '-1' };
                    chart_array[idx].update();

                    losschart_array[idx].data.labels = timestamps;
                    losschart_array[idx].data.datasets[0] = { label: "Loss", data: lossData.map(row => row[idx]), backgroundColor: "black", borderColor: "black", fill: false }

                    losschart_array[idx].options.plugins.annotation.annotations[0].yMin = data.thr_now_model[idx]
                    losschart_array[idx].options.plugins.annotation.annotations[0].yMax = data.thr_now_model[idx]

                    losschart_array[idx].update();
                });

                // Severity Cards
                renderSeverityCards(severityLabels, severityValues, severityCounts, colors);
            }
        });

        updateTimeinfo();
    }

    $(document).ready(function () {
        var end_date = nowDateMoment.format("YYYY-MM-DDTHH:mm:ss");
        var start_date = nowDateMoment.subtract(1, 'hours').format("YYYY-MM-DDTHH:mm:ss");

        $.ajax({
            type: "GET",
            dataType: "json",
            url: "/api/severity_plot",
            data: { start_date: start_date, end_date: end_date },
            success: function (data) {
                let [timestamps, predictions, predictions_std, originalData, lossData,
                    severityData, severityLabels, severityValues, severityCounts, colors] = parseData_fromserver(data)

                // Build sensor card HTML containers
                const chartsContainer = document.getElementById('sensor-charts-container');
                chartsContainer.innerHTML = '';
                severityLabels.slice(0, 4).forEach((feature, idx) => {
                    const col = document.createElement('div');
                    col.className = 'col-md-12 col-sm-12 px-0';
                    col.innerHTML = `
                        <div class="x_panel tile" style="margin-bottom:10px">
                            <div class="sensor-card">
                                <div class="sensor-card-header">
                                    <span class="badge-severity" style="background:${colors[idx]}"></span>
                                    ${feature}
                                </div>
                                <div class="sensor-card-body">
                                    <div class="sensor-chart-col">
                                        <div class="sensor-chart-label">Original vs Prediction</div>
                                        <div class="sensor-chart-wrap">
                                            <canvas id="lineChart${idx + 1}"></canvas>
                                        </div>
                                    </div>
                                    <div class="sensor-chart-col">
                                        <div class="sensor-chart-label">Loss & Threshold</div>
                                        <div class="sensor-chart-wrap">
                                            <canvas id="losslineChart${idx + 1}"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    chartsContainer.appendChild(col);
                });

                // Create charts after DOM elements exist
                severityLabels.slice(0, 4).forEach((feature, idx) => {
                    const predData = predictions.map(row => row[idx]);
                    const upperBound = predictions.map((row, i) => row[idx] + predictions_std[i][idx]);
                    const lowerBound = predictions.map((row, i) => row[idx] - predictions_std[i][idx]);

                    chart_array.push(new Chart(document.getElementById(`lineChart${idx + 1}`).getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: timestamps,
                            datasets: [
                                { label: "Original", data: originalData.map(row => row[idx]), backgroundColor: "red", borderColor: "red", fill: false },
                                { label: "Prediction", data: predData, backgroundColor: "blue", borderColor: "blue", fill: false },
                                { label: "Uncertainty", data: upperBound, borderColor: "rgba(0,0,255,0.2)", backgroundColor: "rgba(0,0,255,0.1)", borderWidth: 0, pointRadius: 0, fill: false },
                                { label: "Uncertainty", data: lowerBound, borderColor: "rgba(0,0,255,0.2)", backgroundColor: "rgba(0,0,255,0.1)", borderWidth: 0, pointRadius: 0, fill: '-1' }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: { duration: 500 },
                            plugins: {
                                legend: {
                                    display: true,
                                    labels: {
                                        boxWidth: 10,
                                        font: { size: 11 },
                                        filter: (item, chart) => {
                                            const seen = new Set();
                                            const dominated = [];
                                            chart.datasets.forEach((ds, i) => {
                                                if (seen.has(ds.label)) dominated.push(i);
                                                else seen.add(ds.label);
                                            });
                                            return !dominated.includes(item.datasetIndex);
                                        }
                                    }
                                },
                                title: { display: false }
                            },
                            scales: {
                                x: xChartLineFormat,
                                y: {
                                    title: { display: true, text: unitSet[featureSet.indexOf(feature)] }
                                }
                            }
                        }
                    }));

                    losschart_array.push(new Chart(document.getElementById(`losslineChart${idx + 1}`).getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: timestamps,
                            datasets: [{ label: "Loss", data: lossData.map(row => row[idx]), backgroundColor: "black", borderColor: "black", fill: false }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: { duration: 500 },
                            plugins: {
                                legend: { display: true, labels: { boxWidth: 10, font: { size: 11 } } },
                                title: { display: false },
                                annotation: {
                                    annotations: [{
                                        type: 'line',
                                        yMin: data.thr_now_model[idx],
                                        yMax: data.thr_now_model[idx],
                                        borderColor: 'red',
                                        borderWidth: 3,
                                        label: {
                                            display: true,
                                            position: 'center',
                                            content: "Threshold",
                                            drawTime: 'afterDatasetsDraw',
                                        }
                                    }]
                                }
                            },
                            scales: {
                                x: xChartLineFormat,
                                y: {
                                    title: { display: true, text: unitSet[featureSet.indexOf(feature)] }
                                }
                            }
                        },
                    }));
                });

                // Severity Cards
                renderSeverityCards(severityLabels, severityValues, severityCounts, colors);
            }
        });

        updateTimeinfo();

        setInterval(() => {
            updateChart();
        }, 5 * 60 * 1000);
    });
</script>
{% endblock %}
