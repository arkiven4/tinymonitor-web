<!-- templates/index.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Overall CBM{% endblock %}

{% block content %}

<style>
    /* ── Full-viewport, no-scroll layout ── */
    html, body {
        overflow: hidden !important;
        height: 100vh !important;
        margin: 0;
        padding: 0;
    }

    .nav-sm .container.body .right_col {
        padding: 0 !important;
        margin-left: 0 !important;
    }

    #dashboard-wrapper {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* ── Header bar ── */
    #dashboard-header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.4vh 1vw;
        background: #fff;
        border-bottom: 1px solid #e6e9ed;
    }
    #dashboard-header .brand {
        display: flex;
        align-items: center;
        gap: 0.5vw;
    }
    #dashboard-header .brand img {
        border-radius: 20%;
        width: clamp(20px, 2vw, 35px);
    }
    #dashboard-header .brand h2 {
        margin: 0;
        font-size: clamp(0.7rem, 1.1vw, 1.3rem);
        white-space: nowrap;
    }
    #dashboard-header .legend {
        display: flex;
        gap: 0.8vw;
        align-items: center;
        font-size: clamp(0.55rem, 0.7vw, 0.85rem);
    }
    #dashboard-header .legend .swatch {
        width: clamp(10px, 1vw, 18px);
        height: clamp(10px, 1vw, 18px);
        background: rgb(0,128,0);
        display: inline-block;
    }
    #dashboard-header .legend .swatch-severity { border-radius: 3px; }
    #dashboard-header .legend .swatch-priority  { border-radius: 50%; }

    /* ── Main diagram area ── */
    #dashboard-main {
        flex: 1;
        min-height: 0;
        position: relative;
        background-color: rgb(243, 243, 243);
        overflow: hidden;
    }
    #dashboard-main > img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }

    /* ── Footer bar ── */
    #dashboard-footer {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.3vh 1vw;
        background: #fff;
        border-top: 1px solid #e6e9ed;
        font-size: clamp(0.55rem, 0.7vw, 0.85rem);
    }

    /* ── Sensor point buttons (original btn style, responsive) ── */
    .sensor-point {
        position: absolute;
        z-index: 1;
    }
    .custom_button_status {
        font-size: clamp(0.45rem, 0.6vw, 0.9rem);
        border-radius: 6px;
        background: rgba(255,255,255,0.92);
        color: black;
        padding: clamp(2px, 0.3vh, 6px) clamp(3px, 0.4vw, 8px);
        white-space: nowrap;
        line-height: 1.4;
        border: 1px solid rgba(0,0,0,0.15);
        box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
    .custom_button_status .badge {
        font-size: clamp(0.38rem, 0.52vw, 0.75rem);
        padding: clamp(1px, 0.15vh, 3px) clamp(3px, 0.3vw, 6px);
        vertical-align: middle;
    }
    .box_withborder {
        border-radius: 5px;
        border-color: black;
        border-width: 2px;
    }

    /* ── Floating pie-chart panel (bottom-right of diagram) ── */
    #floating-charts {
        position: absolute;
        bottom: 1vh;
        right: 1vw;
        z-index: 10;
        display: flex;
        align-items: flex-start;  /* titles align at top */
        gap: 0.8vw;
        pointer-events: none;
    }
    #floating-charts .chart-box {
        pointer-events: auto;
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(0,0,0,0.15);
        border-radius: 6px;
        padding: clamp(3px, 0.4vw, 8px);
        text-align: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
    #floating-charts .chart-box .chart-title {
        font-size: clamp(0.42rem, 0.55vw, 0.75rem);
        font-weight: 600;
        margin-bottom: 2px;
    }
    #floating-charts canvas {
        padding-bottom: 4px;
    }
    #floating-charts .chart-legend {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2px 6px;
        margin-top: 3px;
        max-width: clamp(80px, 9vw, 160px);
    }
    #floating-charts .chart-legend .legend-item {
        display: flex;
        align-items: center;
        gap: 2px;
        font-size: clamp(0.35rem, 0.45vw, 0.65rem);
        white-space: nowrap;
    }
    #floating-charts .chart-legend .legend-swatch {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        flex-shrink: 0;
    }

    /* ── DataTables margin fix ── */
    div.dt-container div.dt-layout-row {
        margin: 0 !important;
    }
</style>

<div id="dashboard-wrapper">
    <!-- ── Header ── -->
    <div id="dashboard-header">
        <div class="brand">
            <img src="{% static 'img/vale_logo.jpeg' %}">
            <h2>Condition Based Monitoring System Plant - LGS1</h2>
        </div>
        <div class="legend">
            <div style="display:flex;align-items:center;gap:3px;">
                <span class="swatch swatch-severity"></span><span>Severity</span>
            </div>
            <div style="display:flex;align-items:center;gap:3px;">
                <span class="swatch swatch-priority"></span><span>Priority</span>
            </div>
        </div>
    </div>

    <!-- ── Main diagram ── -->
    <div id="dashboard-main">
        <img src="{% static 'img/main_hydro2.png' %}">
        <!-- sensor point divs generated dynamically by JS -->

        <!-- Floating pie charts -->
        <div id="floating-charts">
            <div class="chart-box">
                <div class="chart-title">Operation Mode (YTD)</div>
                <canvas id="operation_modeChart"></canvas>
                <div id="mode_legend" class="chart-legend"></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">Load Distribution (YTD)</div>
                <canvas id="operation_zoneChart"></canvas>
                <div id="zone_legend" class="chart-legend"></div>
            </div>
        </div>
    </div>

    <!-- ── Footer ── -->
    <div id="dashboard-footer">
        <div>
            Last Calculation: <span id="last_calcdate">—</span> &nbsp;|&nbsp;
            Next Calculation: <span id="next-update">—</span>
        </div>
    </div>
</div>

<script>
    // ── Sensor point definitions ──
    // sensorPoints[i] matches featureSet[i] / unitSet[i] from base.html
    // name = short display label, top/left/right = position %
    // null entries = features not displayed on the diagram
    const sensorPoints = [
        /* 0  Active Power                          */ { top: 52,    left: 73,    name: "Active Power" },
        /* 1  Reactive Power                         */ { top: 52,    left: 81,    name: "Reactive Power" },
        /* 2  Governor speed actual                  */ { top: 58,    left: 73,   name: "Governor Speed" },
        /* 3  Opening Wicked Gate                    */ { top: 84,   left: 29,   name: "Opening Wicked Gate" },
        /* 4  Penstock pressure                      */ { top: 72,   left: 30,   name: "Penstock pressure" },
        /* 5  Governor Penstock Pressure              */ { top: 78,   left: 28, name: "Governor Penstock Press" },
        /* 6  Penstock Flow                          */ { top: 72,   left: 22,   name: "Penstock Flow" },
        /* 7  Turbine flow                           */ { top: 78,   left: 21,   name: "Turbine flow" },
        /* 8  Gen Voltage Phase 1                    */ { top: 29,   left: 73,    name: "Gen Voltage Ph.1" },
        /* 9  Gen Voltage Phase 2                    */ { top: 35,   left: 73,   name: "Gen Voltage Ph.2" },
        /* 10 Gen Voltage Phase 3                    */ { top: 41,   left: 73,   name: "Gen Voltage Ph.3" },
        /* 11 Gen Current Phase 1                    */ { top: 29,   left: 82,    name: "Gen Current Ph.1" },
        /* 12 Gen Current Phase 2                    */ { top: 35,   left: 82,   name: "Gen Current Ph.2" },
        /* 13 Gen Current Phase 3                    */ { top: 41,   left: 82,   name: "Gen Current Ph.3" },
        /* 14 UGB X displacement                     */ { top: 9,    left: 63,   name: "UGB X displacement" },
        /* 15 UGB Y displacement                     */ { top: 15,   left: 63,   name: "UGB Y displacement" },
        /* 16 LGB X displacement                     */ { top: 50,   left: 57,   name: "LGB X displacement" },
        /* 17 LGB Y displacement                     */ { top: 56,   left: 57,   name: "LGB Y displacement" },
        /* 18 TGB X displacement                     */ { top: 68,   left: 60,   name: "TGB X displacement" },
        /* 19 TGB Y displacement                     */ { top: 74,   left: 60,   name: "TGB Y displacement" },
        /* 20 Surface Air Cooler Air Outlet Temp     */ { top: 46,   left: 15,   name: "SAC Air Outlet T." },
        /* 21 Surface Air Cooler Water Inlet Temp    */ { top: 52,   left: 15,   name: "SAC Water Inlet T." },
        /* 22 Surface Air Cooler Water Outlet Temp   */ { top: 58,   left: 15,   name: "SAC Water Outlet T." },
        /* 23 Stator core temperature                */ { top: 16,   left: 15,    name: "Stator core T." },
        /* 24 Stator winding temperature 13          */ { top: 22,   left: 13.5,    name: "Stator winding T. 13" },
        /* 25 Stator winding temperature 14          */ { top: 28,   left: 13.5,    name: "Stator winding T. 14" },
        /* 26 Stator winding temperature 15          */ { top: 34,   left: 13.5,    name: "Stator winding T. 15" },
        /* 27 UGB metal temperature                  */ { top: 12,    left: 31,   name: "UGB metal Temp" },
        /* 28 LGB metal temperature 1                */ { top: 46,   left: 33,   name: "LGB metal Temp 1" },
        /* 29 LGB metal temperature 2                */ { top: 52,   left: 33,   name: "LGB metal Temp 2" },
        /* 30 UGB oil temperature                    */ { top: 8,    left: 40,   name: "UGB oil Temp" },
        /* 31 LGB oil temperature                    */ { top: 58,   left: 34,   name: "LGB oil Temp" },
        /* 32 UGB Oil Contaminant                    */ { top: 6,    left: 30, name: "UGB Oil Contaminant" },
        /* 33 Gen Thrust Bearing Oil Contaminant     */ { top: 37,   left: 36,  name: "Gen Thrust Bearing Oil Contam." },
        /* 34 UGB cooling water flow                 */ { top: 7.5,  left: 53,   name: "UGB CW flow" },
        /* 35 LGB cooling water flow                 */ { top: 43,   left: 57,   name: "LGB CW flow" },
        /* 36 Generator cooling water flow           */ { top: 21,   left: 74,   name: "Generator CW flow" },
    ];

    // Additional sensor points (not in the severity model, data-only display)
    // additisensorPoints[i] matches addfeatureSet[i] / addunitSet[i] from base.html
    const additisensorPoints = [
        { top: 86,   left: 65,   name: "dummmy" },
        /* 1  TGB temperature  */ { top: 80,   left: 60,   name: "TGB temperature" },
    ];

    // ── Helper functions ──
    function severity2color(severity) {
        const norm = (severity - 1) / 5;
        const colorScale = d3.scaleLinear()
            .domain([0, 0.5, 1])
            .range(["green", "yellow", "red"]);
        return colorScale(norm);
    }

    function getContrastingTextColor(bgColor) {
        const c = d3.color(bgColor);
        const luminance = (0.299 * c.r + 0.587 * c.g + 0.114 * c.b) / 255;
        return luminance > 0.7 ? "black" : "white";
    }

    // ── Create sensor point DOM elements dynamically ──
    function createSensorDivs() {
        const container = document.getElementById('dashboard-main');
        const allPoints = [
            ...sensorPoints.map((p, i) => ({ ...p, id: `sp${i}` })),
            ...additisensorPoints.map((p, i) => ({ ...p, id: `sp_add${i}` }))
        ];
        allPoints.forEach(p => {
            if (!p) return;
            const div = document.createElement('div');
            div.id = p.id;
            div.className = 'sensor-point';
            div.style.top = `${p.top}%`;
            if (p.left !== undefined)  div.style.left  = `${p.left}%`;
            if (p.right !== undefined) div.style.right = `${p.right}%`;
            container.appendChild(div);
        });
    }

    // ── Main ──
    $(document).ready(function () {
        createSensorDivs();

        function fetchAndRender() {
            var end_date = moment.utc().format("YYYY-MM-DDTHH:mm:ss");
            var start_date = moment.utc().subtract(2, 'hours').format("YYYY-MM-DDTHH:mm:ss");

            $.ajax({
                type: "GET",
                dataType: "json",
                url: "/api/panel_summary",
                data: { start_date: start_date, end_date: end_date },
                success: function (data) {
                    // ── Timestamps ──
                    const lastUpdateUtc = new Date(
                        data.last_timestamp.endsWith('Z')
                            ? data.last_timestamp
                            : data.last_timestamp + 'Z'
                    );
                    const witaOpts = {
                        timeZone: 'Asia/Makassar',
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    };
                    document.getElementById("last_calcdate").textContent =
                        lastUpdateUtc.toLocaleString('en-GB', witaOpts);
                    const nextUpdateUtc = new Date(lastUpdateUtc.getTime() + 10 * 60 * 1000);
                    document.getElementById("next-update").textContent =
                        nextUpdateUtc.toLocaleString('en-GB', witaOpts);

                    // ── Main sensor points (with severity model) ──
                    // sensorPoints[i] corresponds to featureSet[i]
                    for (let i = 0; i < sensorPoints.length; i++) {
                        const p = sensorPoints[i];
                        if (!p) continue;
                        const el = document.getElementById(`sp${i}`);
                        const featureName = featureSet[i];
                        const currentUnit = unitSet[i];
                        const sensorVal = data.last_sensor_featname[featureName];
                        const severityVal = data.last_severity_featname[featureName];
                        const priorityVal = data.priority_parameter[featureName];

                        el.innerHTML = `<div class="btn custom_button_status" onclick="window.open('/advisory/chart?feat_id=${i}','_blank')">
                            ${p.name} | <span class="badge" style="background-color: ${severity2color(severityVal)}; color: ${getContrastingTextColor(severity2color(severityVal))}">${severityVal}</span> <span class="badge" style="display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background-color: ${severity2color(percentage2priority(priorityVal))}; color: ${getContrastingTextColor(severity2color(percentage2priority(priorityVal)))}">${percentage2alarmCode(priorityVal)}</span><br>
                            <span class="badge bg-dark text-light box_withborder">${sensorVal} ${currentUnit}</span>`;
                        if (severityVal > 1) {
                            el.innerHTML += `<span class="position-absolute translate-middle p-2 bg-danger border border-light rounded-circle" style="top:7%; left: 5%; background-color: ${severity2color(severityVal)}">
                                               <span class="visually-hidden">Warnings</span></span>`;
                        }
                        el.innerHTML += "</div>";
                        el.style.zIndex = percentage2severity(severityVal);
                    }

                    // ── Additional sensor points (data only, no model) ──
                    // additisensorPoints[i] corresponds to addfeatureSet[i]
                    
                    for (let i = 0; i < additisensorPoints.length; i++) {
                        const p = additisensorPoints[i];
                        if (!p) continue;
                        if (p.name == "dummmy") continue;
                        const el = document.getElementById(`sp_add${i}`);
                        const featureName = addfeatureSet[i];
                        const currentUnit = addunitSet[i];
                        const sensorVal = data.last_sensor_featname[featureName];

                        el.innerHTML = `<div class="btn custom_button_status">
                            ${p.name} | <span class="badge" style="background-color: gray;">x</span> <span class="badge" style="display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background-color: gray;">x</span><br>
                            <span class="badge bg-dark text-light box_withborder">${sensorVal} ${currentUnit}</span></div>`;
                    }
                }
            });
        }

        // Initial load
        fetchAndRender();

        // Refresh data via AJAX every 5 minutes (no page reload)
        setInterval(fetchAndRender, 5 * 60 * 1000);

        // ── Floating pie charts: Operation Mode & Load Distribution (YTD) ──
        const ZONE_COLORS = {
            'Shutdown':  '#6c757d',
            'Warming':   '#fd7e14',
            'No Load':   '#ffc107',
            'Low':       '#20c997',
            'Rough':     '#dc3545',
            'Part':      '#0dcaf0',
            'Efficient': '#198754',
            'High':      '#0d6efd',
            'Undefined': '#adb5bd'
        };
        // Shorten zone labels from API (remove "Load"/"Zone" suffix)
        const ZONE_RENAME = {
            'Low Load':       'Low',
            'Rough Zone':     'Rough',
            'Part Load':      'Part',
            'Efficient Load': 'Efficient',
            'High Load':      'High'
        };
        const MODE_RENAME = { 'Grid': 'AUX', 'Furnace': 'FCE' };
        const MODE_COLORS = { 'AUX': '#00807C', 'FCE': '#EEA722' };

        let modeChartInstance = null;
        let zoneChartInstance = null;

        const shadowPlugin = {
            id: 'shadowSlices',
            beforeDatasetDraw(chart, args) {
                const { ctx } = chart;
                if (chart.config.type !== 'pie') return;
                const meta = chart.getDatasetMeta(args.index);
                meta.data.forEach(seg => {
                    const origDraw = seg.draw;
                    seg.draw = function () {
                        ctx.save();
                        ctx.shadowColor = 'rgba(0,0,0,0.25)';
                        ctx.shadowBlur = 6;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        origDraw.apply(this, arguments);
                        ctx.restore();
                    };
                });
            }
        };

        function buildPieConfig(labels, data, bgColors) {
            return {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: bgColors,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function (ctx) {
                                    const v = ctx.raw;
                                    const total = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                                    return ` ${v} (${((v / total) * 100).toFixed(1)}%)`;
                                }
                            }
                        },
                        datalabels: {
                            formatter: (value, ctx) => {
                                const total = ctx.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                                return ((value / total) * 100).toFixed(1) + '%';
                            },
                            color: '#fff',
                            font: { weight: 'bold', size: 9 }
                        }
                    }
                },
                plugins: [shadowPlugin, ChartDataLabels]
            };
        }

        function renderHtmlLegend(containerId, labels, colors) {
            const el = document.getElementById(containerId);
            el.innerHTML = labels.map((lbl, i) =>
                `<span class="legend-item"><span class="legend-swatch" style="background:${colors[i]}"></span>${lbl}</span>`
            ).join('');
        }

        function fetchAndRenderCharts() {
            const end_date = moment.utc().format("YYYY-MM-DDTHH:mm:ss");
            const start_dateYTD = moment.utc().startOf('year').format("YYYY-MM-DDTHH:mm:ss");

            $.ajax({
                type: "GET",
                dataType: "json",
                url: "/api/zone_distribution",
                data: { start_date: start_dateYTD, end_date: end_date },
                success: function (data) {
                    // ── Operation Mode pie ──
                    const modeLabels = Object.keys(data.operation_mode).map(k => MODE_RENAME[k] || k);
                    const modeData = Object.values(data.operation_mode);
                    const modeBg = modeLabels.map(l => MODE_COLORS[l] || '#adb5bd');

                    // Set both canvases to same fixed pixel size so pies are equal
                    const chartPx = Math.round(Math.min(Math.max(window.innerWidth * 0.09, 80), 160));
                    ['operation_modeChart', 'operation_zoneChart'].forEach(id => {
                        const c = document.getElementById(id);
                        c.width = chartPx;
                        c.height = chartPx;
                    });

                    if (modeChartInstance) modeChartInstance.destroy();
                    modeChartInstance = new Chart(
                        document.getElementById('operation_modeChart').getContext('2d'),
                        buildPieConfig(modeLabels, modeData, modeBg)
                    );
                    renderHtmlLegend('mode_legend', modeLabels, modeBg);

                    // ── Load Distribution pie ──
                    const zoneLabels = Object.keys(data.operation_zone).map(k => ZONE_RENAME[k] || k);
                    const zoneData = Object.values(data.operation_zone);
                    const zoneBg = zoneLabels.map(l => ZONE_COLORS[l] || '#adb5bd');

                    if (zoneChartInstance) zoneChartInstance.destroy();
                    zoneChartInstance = new Chart(
                        document.getElementById('operation_zoneChart').getContext('2d'),
                        buildPieConfig(zoneLabels, zoneData, zoneBg)
                    );
                    renderHtmlLegend('zone_legend', zoneLabels, zoneBg);
                }
            });
        }

        // Initial chart load
        fetchAndRenderCharts();

        // Refresh charts every 30 minutes (less frequent than sensor data)
        setInterval(fetchAndRenderCharts, 30 * 60 * 1000);
    });
</script>
{% endblock %}
